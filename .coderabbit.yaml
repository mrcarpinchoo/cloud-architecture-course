language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*.py"
      instructions: >
        Review for Python best practices, proper error handling,
        PEP 8 compliance, and secure credential usage.
    - path: ".github/workflows/**"
      instructions: >
        Review for GitHub Actions security best practices, pinned action
        versions, and least-privilege permissions.
    - path: "**/README.md"
      instructions: >
        Review for clarity, completeness of learning objectives, accurate
        technology and concept listings, and reproducibility of steps.
    - path: "[0-1][0-9]-*/**"
      instructions: >
        Review lab content for technical accuracy, clear step-by-step
        instructions, and educational value. Flag any steps that may
        not work in a standard AWS Academy Learner Lab environment.
  path_filters:
    - "!**/screenshots/**"
    - "!**/*.gif"
    - "!**/*.png"
    - "!package-lock.json"
chat:
  auto_reply: true
